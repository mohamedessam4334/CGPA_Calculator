<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA & GPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        .slide-in { animation: slideIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .semester-tab.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .semester-tab.active .semester-gpa-badge { background-color: rgba(255,255,255,0.2); color: white; }
        .semester-tab { transition: all 0.15s ease; }
        .course-row { transition: all 0.2s ease; }
        .course-row.removing { opacity: 0; transform: translateX(20px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Top Navigation / Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">G</div>
                <h1 class="text-lg font-bold text-slate-800">CGPA Calculator</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:block text-right">
                    <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Cumulative GPA</p>
                    <p id="header-cgpa" class="text-xl font-bold text-indigo-600 leading-tight">0.00</p>
                </div>
                <div class="hidden sm:block text-right border-l border-slate-200 pl-4">
                    <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Total Credits</p>
                    <p id="header-total-credits" class="text-xl font-bold text-slate-700 leading-tight">0</p>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex flex-col lg:flex-row gap-6">
            
            <!-- Sidebar: Semesters -->
            <aside class="w-full lg:w-72 flex-shrink-0">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
                        <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Semesters</h2>
                        <button onclick="addSemester()" class="text-xs font-medium text-indigo-600 hover:text-indigo-700 flex items-center gap-1 px-2 py-1 rounded hover:bg-indigo-50 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                            Add
                        </button>
                    </div>
                    <div id="semester-list" class="divide-y divide-slate-100 max-h-[60vh] overflow-y-auto">
                        <!-- Semester tabs injected here -->
                    </div>
                    <div class="px-4 py-3 bg-slate-50 border-t border-slate-100">
                        <div class="flex justify-between items-center text-xs text-slate-500">
                            <span>All Semesters</span>
                            <span id="sidebar-cgpa" class="font-semibold text-indigo-600">CGPA: 0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Grading Scale -->
                <div class="mt-4 bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                    <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Grading Scale</h3>
                    <div class="grid grid-cols-3 gap-y-1 gap-x-2 text-[11px]">
                        <div class="flex justify-between"><span class="font-medium text-slate-600">A+</span><span class="text-slate-400">4.00</span></div>
                        <div class="flex justify-between"><span class="font-medium text-slate-600">A</span><span class="text-slate-400">3.70</span></div>
                        <div class="flex justify-between"><span class="font-medium text-slate-600">B+</span><span class="text-slate-400">3.30</span></div>
                        <div class="flex justify-between"><span class="font-medium text-slate-600">B</span><span class="text-slate-400">3.00</span></div>
                        <div class="flex justify-between"><span class="font-medium text-slate-600">C+</span><span class="text-slate-400">2.70</span></div>
                        <div class="flex justify-between"><span class="font-medium text-slate-600">C</span><span class="text-slate-400">2.30</span></div>
                        <div class="flex justify-between"><span class="font-medium text-slate-600">D+</span><span class="text-slate-400">2.00</span></div>
                        <div class="flex justify-between"><span class="font-medium text-slate-600">D</span><span class="text-slate-400">1.70</span></div>
                        <div class="flex justify-between"><span class="font-medium text-slate-600">F</span><span class="text-slate-400">1.00</span></div>
                    </div>
                </div>
            </aside>

            <!-- Main Content: Selected Semester -->
            <main class="flex-1 min-w-0">
                <div id="semester-content" class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <!-- Content injected here -->
                </div>
            </main>
        </div>
    </div>

    <script>
        const gradePoints = {
            'A+': 4.00, 'A': 3.70, 'B+': 3.30, 'B': 3.00,
            'C+': 2.70, 'C': 2.30, 'D+': 2.00, 'D': 1.70, 'F': 1.00
        };
        const grades = Object.keys(gradePoints);

        let semesters = [];
        let activeSemesterId = null;
        let semesterCounter = 0;
        let courseCounter = 0;

        function generateId() {
            return 'id_' + Math.random().toString(36).substr(2, 9);
        }

        function createSemester(name = null) {
            semesterCounter++;
            const id = generateId();
            const semester = {
                id: id,
                name: name || `Semester ${semesterCounter}`,
                courses: []
            };
            for (let i = 0; i < 4; i++) {
                semester.courses.push(createCourse());
            }
            return semester;
        }

        function createCourse() {
            courseCounter++;
            return { id: 'course_' + courseCounter, name: '', credits: '', grade: '' };
        }

        function addSemester() {
            const sem = createSemester();
            semesters.push(sem);
            activeSemesterId = sem.id;
            renderAll();
            setTimeout(() => {
                const el = document.getElementById(`sem-name-${sem.id}`);
                if (el) el.focus();
            }, 50);
        }

        function removeSemester(id, event) {
            event.stopPropagation();
            if (semesters.length <= 1) {
                alert("You must have at least one semester.");
                return;
            }
            if (!confirm("Delete this semester and all its courses?")) return;
            semesters = semesters.filter(s => s.id !== id);
            if (activeSemesterId === id) {
                activeSemesterId = semesters[0]?.id || null;
            }
            renderAll();
        }

        function setActiveSemester(id) {
            activeSemesterId = id;
            renderAll();
        }

        function updateSemesterName(id, name) {
            const sem = semesters.find(s => s.id === id);
            if (sem) sem.name = name;
            renderSidebar();
            updateHeaderStats();
        }

        function addCourseToSemester(semId) {
            const sem = semesters.find(s => s.id === semId);
            if (sem) {
                sem.courses.push(createCourse());
                renderMainContent();
                updateCalculations();
                setTimeout(() => {
                    const inputs = document.querySelectorAll(`#semester-content input.course-name`);
                    if (inputs.length) inputs[inputs.length - 1].focus();
                }, 50);
            }
        }

        function removeCourseFromSemester(semId, courseId) {
            const sem = semesters.find(s => s.id === semId);
            if (sem) {
                const row = document.getElementById(`course-row-${courseId}`);
                if (row) {
                    row.classList.add('removing');
                    setTimeout(() => {
                        sem.courses = sem.courses.filter(c => c.id !== courseId);
                        renderMainContent();
                        updateCalculations();
                    }, 200);
                }
            }
        }

        function updateCourse(semId, courseId, field, value) {
            const sem = semesters.find(s => s.id === semId);
            if (sem) {
                const course = sem.courses.find(c => c.id === courseId);
                if (course) {
                    course[field] = value;
                    updateCalculations();
                }
            }
        }

        function calculateSemesterGPA(semester) {
            let totalWeighted = 0;
            let totalCredits = 0;
            semester.courses.forEach(c => {
                const cred = parseFloat(c.credits);
                const gp = gradePoints[c.grade];
                if (!isNaN(cred) && cred > 0 && gp !== undefined) {
                    totalWeighted += gp * cred;
                    totalCredits += cred;
                }
            });
            return { gpa: totalCredits > 0 ? totalWeighted / totalCredits : 0, credits: totalCredits, weighted: totalWeighted };
        }

        function calculateCGPA() {
            let totalWeighted = 0;
            let totalCredits = 0;
            semesters.forEach(sem => {
                const res = calculateSemesterGPA(sem);
                totalWeighted += res.weighted;
                totalCredits += res.credits;
            });
            return { cgpa: totalCredits > 0 ? totalWeighted / totalCredits : 0, totalCredits, totalWeighted };
        }

        function getGPAColor(gpa) {
            if (gpa >= 3.5) return 'text-emerald-500';
            if (gpa >= 3.0) return 'text-indigo-500';
            if (gpa >= 2.0) return 'text-amber-500';
            return 'text-red-500';
        }

        function getGPAColorDark(gpa) {
            if (gpa >= 3.5) return 'text-emerald-400';
            if (gpa >= 3.0) return 'text-indigo-300';
            if (gpa >= 2.0) return 'text-amber-300';
            return 'text-red-400';
        }

        function renderSidebar() {
            const container = document.getElementById('semester-list');
            container.innerHTML = '';
            
            semesters.forEach(sem => {
                const res = calculateSemesterGPA(sem);
                const isActive = sem.id === activeSemesterId;
                const gpaStr = res.credits > 0 ? res.gpa.toFixed(2) : '—';
                
                const div = document.createElement('div');
                div.className = `semester-tab cursor-pointer px-4 py-3 flex items-center justify-between group ${isActive ? 'active bg-indigo-600' : 'hover:bg-slate-50'}`;
                div.onclick = () => setActiveSemester(sem.id);
                div.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate ${isActive ? 'text-white' : 'text-slate-700'}">${escapeHtml(sem.name)}</p>
                        <p class="text-[10px] ${isActive ? 'text-indigo-200' : 'text-slate-400'}">${res.credits > 0 ? res.credits.toFixed(1) + ' cr' : 'No credits'}</p>
                    </div>
                    <div class="flex items-center gap-2 ml-2">
                        <span class="semester-gpa-badge text-xs font-bold px-2 py-0.5 rounded-full ${isActive ? 'bg-white/20 text-white' : 'bg-slate-100 text-slate-600'}">${gpaStr}</span>
                        <button onclick="removeSemester('${sem.id}', event)" class="opacity-0 group-hover:opacity-100 ${isActive ? 'text-indigo-200 hover:text-white' : 'text-slate-300 hover:text-red-500'} transition-opacity p-1" title="Delete semester">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderMainContent() {
            const container = document.getElementById('semester-content');
            const sem = semesters.find(s => s.id === activeSemesterId);
            
            if (!sem) {
                container.innerHTML = '<div class="p-8 text-center text-slate-400">No semester selected.</div>';
                return;
            }

            const res = calculateSemesterGPA(sem);
            const gpaColor = getGPAColorDark(res.gpa);

            let coursesHtml = '';
            sem.courses.forEach((course, idx) => {
                coursesHtml += `
                    <div id="course-row-${course.id}" class="course-row fade-in grid grid-cols-1 sm:grid-cols-12 gap-3 items-start sm:items-end p-3 rounded-lg border border-slate-100 hover:border-slate-200 hover:bg-slate-50/50 transition-all">
                        <div class="sm:col-span-5">
                            ${idx === 0 ? '<label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1">Course Name</label>' : ''}
                            <input type="text" value="${escapeHtml(course.name)}" placeholder="e.g. Calculus I"
                                class="course-name w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-800 placeholder-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                                oninput="updateCourse('${sem.id}', '${course.id}', 'name', this.value)">
                        </div>
                        <div class="sm:col-span-2">
                            ${idx === 0 ? '<label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1">Credits</label>' : ''}
                            <input type="number" value="${course.credits}" placeholder="3" min="0" step="0.5"
                                class="course-credits w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-800 placeholder-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                                oninput="updateCourse('${sem.id}', '${course.id}', 'credits', this.value)">
                        </div>
                        <div class="sm:col-span-3">
                            ${idx === 0 ? '<label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1">Grade</label>' : ''}
                            <select class="course-grade w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all cursor-pointer"
                                onchange="updateCourse('${sem.id}', '${course.id}', 'grade', this.value)">
                                <option value="" ${!course.grade ? 'selected' : ''} disabled>Select</option>
                                ${grades.map(g => `<option value="${g}" ${course.grade === g ? 'selected' : ''}>${g} — ${gradePoints[g].toFixed(2)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="sm:col-span-2 flex justify-end">
                            ${idx === 0 ? '<div class="hidden sm:block h-[18px] mb-1"></div>' : ''}
                            <button onclick="removeCourseFromSemester('${sem.id}', '${course.id}')" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Remove course">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = `
                <div class="px-6 py-4 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <div class="flex-1">
                        <input id="sem-name-${sem.id}" type="text" value="${escapeHtml(sem.name)}" 
                            class="text-lg font-bold text-slate-800 bg-transparent border-b-2 border-transparent hover:border-slate-200 focus:border-indigo-500 focus:outline-none transition-colors w-full sm:w-auto"
                            oninput="updateSemesterName('${sem.id}', this.value)">
                        <p class="text-xs text-slate-400 mt-0.5">${sem.courses.length} courses · Click name to edit</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Semester GPA</p>
                            <p class="text-2xl font-bold ${gpaColor}">${res.credits > 0 ? res.gpa.toFixed(2) : '—'}</p>
                        </div>
                        <div class="text-right border-l border-slate-100 pl-4">
                            <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Credits</p>
                            <p class="text-2xl font-bold text-slate-700">${res.credits > 0 ? res.credits.toFixed(1) : '0'}</p>
                        </div>
                    </div>
                </div>
                <div class="px-4 py-4 space-y-2">
                    ${coursesHtml}
                </div>
                <div class="px-4 pb-4">
                    <button onclick="addCourseToSemester('${sem.id}')" class="w-full py-2.5 border-2 border-dashed border-indigo-200 text-indigo-600 text-sm font-medium rounded-lg hover:border-indigo-400 hover:bg-indigo-50 transition-all duration-200 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                        Add Course
                    </button>
                </div>
            `;
        }

        function updateHeaderStats() {
            const cgpaData = calculateCGPA();
            document.getElementById('header-cgpa').textContent = cgpaData.totalCredits > 0 ? cgpaData.cgpa.toFixed(2) : '0.00';
            document.getElementById('header-cgpa').className = `text-xl font-bold leading-tight ${getGPAColor(cgpaData.cgpa)}`;
            document.getElementById('header-total-credits').textContent = cgpaData.totalCredits > 0 ? cgpaData.totalCredits.toFixed(1) : '0';
            document.getElementById('sidebar-cgpa').textContent = `CGPA: ${cgpaData.totalCredits > 0 ? cgpaData.cgpa.toFixed(2) : '0.00'}`;
        }

        function updateCalculations() {
            updateHeaderStats();
            renderSidebar();
            const sem = semesters.find(s => s.id === activeSemesterId);
            if (sem) {
                const res = calculateSemesterGPA(sem);
                const gpaEl = document.querySelector('#semester-content .text-2xl.font-bold');
                const creditsEl = document.querySelectorAll('#semester-content .text-2xl.font-bold')[1];
                if (gpaEl) {
                    gpaEl.textContent = res.credits > 0 ? res.gpa.toFixed(2) : '—';
                    gpaEl.className = `text-2xl font-bold ${getGPAColorDark(res.gpa)}`;
                }
                if (creditsEl) creditsEl.textContent = res.credits > 0 ? res.credits.toFixed(1) : '0';
            }
        }

        function renderAll() {
            renderSidebar();
            renderMainContent();
            updateHeaderStats();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        addSemester();
    </script>
</body>
</html>
